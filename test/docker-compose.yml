name: playwright-container-images-test
services:
  playwright:
    image: "${PLAYWRIGHT_IMAGE_NAME}:${PLAYWRIGHT_IMAGE_TAG}"
    container_name: playwright
    environment:
      BASE_URL: https://www.jobs.wa.gov.au/
      ENV_NAME: test-environment
    command: ["test", "--project=website-user-tests", "--reporter=html,list"]
    healthcheck:
      test: [ "CMD", "pnpm", "exec", "playwright", "--version"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

